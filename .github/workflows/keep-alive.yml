name: Keep Render Backend Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (sleeps after 15 mins of inactivity)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API Health Check
        run: curl -s https://service-marketplace-backend.onrender.com/api/v1/health
