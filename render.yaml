services:
  - type: web
    name: service-marketplace-backend
    env: docker
    rootDir: backend_api
    plan: free # Change to a paid plan if needed
    # Docker environment handles building and starting via the Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_URL
        sync: false # Set this in the Render dashboard from your MySQL database URL
      - key: DOCUMENT_ROOT
        value: public
      - key: SUPABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
