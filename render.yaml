services:
  - type: web
    name: service-marketplace-backend
    env: php
    rootDir: backend_api
    plan: free # Change to a paid plan if needed
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan migrate --force
    # Render's native PHP environment automatically starts Apache/Nginx. We just need to set the document root.
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_URL
        sync: false # Set this in the Render dashboard from your MySQL database URL
      - key: DOCUMENT_ROOT
        value: public
